<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dashboard - SmartSpend</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <nav class="navbar-custom">
        <div>
            <strong>SmartSpend AI</strong>
        </div>
        <div style="display: flex; align-items: center; gap: 20px;">
            <span>Welcome, <span th:text="${#authentication.name}" style="font-weight: bold;">User</span>!</span>
            
            <form th:action="@{/logout}" method="post" style="margin: 0;">
                <button type="submit" class="btn-logout">Logout</button>
            </form>
        </div>
    </nav>

    <div class="content-area">
        <h1>Financial Overview</h1>
        <p>This is where your AI-powered finance tracking begins.</p>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-top: 20px;">
            <div style="background: white; padding: 20px; border-radius: 10px; border-left: 5px solid #2ecc71;">
                <h3>Total Balance</h3>
                <p style="font-size: 24px; font-weight: bold;">$0.00</p>
            </div>
            <div style="background: white; padding: 20px; border-radius: 10px; border-left: 5px solid #e67e22;">
                <h3>Subscriptions</h3>
                <p style="font-size: 24px; font-weight: bold;">0 Active</p>
            </div>
            <div style="background: white; padding: 20px; border-radius: 10px; border-left: 5px solid #3498db;">
                <h3>AI Tip</h3>
                <p th:text="${aiMessage != null ? aiMessage : 'Upload a statement to get AI advice!'}">Loading...</p>
            </div>
        </div>
    </div>

</body>
</html>
