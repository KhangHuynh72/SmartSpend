<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>SmartSpend - Login</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="login-card">
        <h2 style="text-align: center; color: #2c3e50;">SmartSpend AI</h2>
        <p style="text-align: center; color: #7f8c8d;">Personal Finance Tracker</p>

        <form th:action="@{/login}" method="post">
            <div style="margin-bottom: 15px;">
                <label>Email</label><br>
                <input type="text" name="username" style="width: 100%; padding: 8px; margin-top: 5px;" required>
            </div>
            <div style="margin-bottom: 20px;">
                <label>Password</label><br>
                <input type="password" id="password" name="password" style="width: 100%; padding: 8px; margin-top: 5px;" required>
                <div style="margin-top: 5px; font-size: 0.9em;">
                    <input type="checkbox" onclick="togglePassword()"> Show Password
                </div>
            </div>
            <button type="submit" style="width: 100%; background: #2c3e50; color: white; padding: 10px; border: none; border-radius: 5px;">
                Log In
            </button>
            <div style="text-align: center; margin-top: 15px;">
                <a th:href="@{/register}" style="color: #2980b9; text-decoration: none; font-size: 0.9em;">Need an account? Register here</a>
            </div>
        </form>

        <div th:if="${param.error}" style="color: red; margin-top: 15px; text-align: center;">
            Invalid email or password.
        </div>
        
        <div th:if="${param.registered}" style="color: green; margin-top: 15px; text-align: center;">
            Registration successful! Please log in.
        </div>
    </div>
    
    <script>
        function togglePassword() {
            var x = document.getElementById("password");
            if (x.type === "password") {
                x.type = "text";
            } else {
                x.type = "password";
            }
        }
    </script>
</body>
</html>
