<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>SmartSpend AI - Welcome</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="home-container" style="text-align: center; padding-top: 100px;">
        <h1 style="font-size: 3rem; color: #2c3e50;">Take Control of Your Money.</h1>
        <p style="font-size: 1.2rem; color: #7f8c8d; max-width: 600px; margin: 20px auto;">
            SmartSpend AI helps you track expenses, detect hidden subscriptions, 
            and get personalized financial advice using local AI.
        </p>
        
        <div style="margin-top: 40px;">
            <a th:href="@{/login}" 
               style="background: #2ecc71; color: white; padding: 15px 30px; text-decoration: none; border-radius: 5px; font-weight: bold; font-size: 1.1rem;">
               Get Started for Free
            </a>
        </div>

        <div style="margin-top: 60px; display: flex; justify-content: center; gap: 40px;">
            <div style="width: 200px;">
                <h3>Step 1</h3>
                <p>Upload your bank statement.</p>
            </div>
            <div style="width: 200px;">
                <h3>Step 2</h3>
                <p>Identify subscriptions.</p>
            </div>
            <div style="width: 200px;">
                <h3>Step 3</h3>
                <p>Get AI advice.</p>
            </div>
        </div>
    </div>
</body>
</html>
